name: Build YT Downloader

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Tauri app (macOS .dmg)
        working-directory: tauri-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macOS
          path: tauri-app/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Build Tauri app (Windows .exe)
        working-directory: tauri-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .exe installer
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-Windows
          path: tauri-app/src-tauri/target/release/bundle/nsis/*.exe
