name: Build YT Downloader

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Generate Tauri icons
        working-directory: tauri-app
        run: npx @tauri-apps/cli icon src-tauri/icons/source.png || true

      - name: Create placeholder icons if missing
        run: |
          mkdir -p tauri-app/src-tauri/icons
          cd tauri-app/src-tauri/icons
          # Create minimal valid PNG files using Python
          python3 -c "
          import struct, zlib

          def make_png(size):
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              sig = b'\\x89PNG\\r\\n\\x1a\\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              row = b'\\x00' + b'\\xff\\x00\\x00' * size
              raw = row * size
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          for name, size in [('32x32.png',32),('128x128.png',128),('128x128@2x.png',256)]:
              open(name,'wb').write(make_png(size))
          print('Icons created')
          "

      - name: Build Tauri app (macOS .dmg)
        working-directory: tauri-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macOS
          path: tauri-app/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Create placeholder icons if missing
        run: |
          New-Item -ItemType Directory -Force -Path tauri-app/src-tauri/icons
          python -c "
          import struct, zlib

          def make_png(size):
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              row = b'\x00' + b'\xff\x00\x00' * size
              raw = row * size
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          for name, size in [('32x32.png',32),('128x128.png',128),('128x128@2x.png',256)]:
              open('tauri-app/src-tauri/icons/'+name,'wb').write(make_png(size))
          print('Icons created')
          "

      - name: Build Tauri app (Windows .exe)
        working-directory: tauri-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .exe installer
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-Windows
          path: tauri-app/src-tauri/target/release/bundle/nsis/*.exe
