name: Build YT Downloader

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: macos-rust-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Create RGBA icons
        run: |
          mkdir -p tauri-app/src-tauri/icons
          python3 -c "
          import struct, zlib

          def make_rgba_png(size):
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  crc = zlib.crc32(name + data) & 0xffffffff
                  return c + struct.pack('>I', crc)
              sig = b'\x89PNG\r\n\x1a\n'
              # color type 6 = RGBA
              ihdr_data = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
              ihdr = chunk(b'IHDR', ihdr_data)
              # Each row: filter byte + RGBA pixels (red with full alpha)
              row = b'\x00' + b'\xff\x44\x44\xff' * size
              raw = row * size
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {'32x32.png': 32, '128x128.png': 128, '128x128@2x.png': 256}
          for name, size in sizes.items():
              with open(f'tauri-app/src-tauri/icons/{name}', 'wb') as f:
                  f.write(make_rgba_png(size))
          print('RGBA icons created successfully')
          "

      - name: Build Tauri app (macOS .dmg)
        working-directory: tauri-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macOS
          path: tauri-app/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: windows-rust-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Create RGBA icons
        run: |
          New-Item -ItemType Directory -Force -Path tauri-app/src-tauri/icons
          python -c "
          import struct, zlib, os

          def make_rgba_png(size):
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  crc = zlib.crc32(name + data) & 0xffffffff
                  return c + struct.pack('>I', crc)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr_data = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
              ihdr = chunk(b'IHDR', ihdr_data)
              row = b'\x00' + b'\xff\x44\x44\xff' * size
              raw = row * size
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          base = 'tauri-app/src-tauri/icons/'

          # PNG icons
          for name, size in [('32x32.png',32),('128x128.png',128),('128x128@2x.png',256)]:
              with open(base+name,'wb') as f:
                  f.write(make_rgba_png(size))

          # ICO file (Windows) — contains 16x16, 32x32, 48x48
          def make_ico():
              sizes = [16, 32, 48]
              pngs = [make_rgba_png(s) for s in sizes]
              num = len(sizes)
              header = struct.pack('<HHH', 0, 1, num)
              offset = 6 + num * 16
              entries = b''
              for i, (s, png) in enumerate(zip(sizes, pngs)):
                  entries += struct.pack('<BBBBHHII', s, s, 0, 0, 1, 32, len(png), offset)
                  offset += len(png)
              return header + entries + b''.join(pngs)

          with open(base+'icon.ico','wb') as f:
              f.write(make_ico())

          print('All icons created successfully')
          "

      - name: Build Tauri app (Windows .exe)
        working-directory: tauri-app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .exe installer
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-Windows
          path: tauri-app/src-tauri/target/release/bundle/nsis/*.exe
