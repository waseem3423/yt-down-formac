<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .container {
      width: 460px;
      padding: 32px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #ff4444;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { display: block; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    h1 span { color: #ff4444; }

    .field-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .url-input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }

    .url-input:focus { border-color: #ff4444; }
    .url-input::placeholder { color: #555; }

    .quality-options {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .quality-btn {
      flex: 1;
      padding: 10px 0;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      background: #1a1a1a;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quality-btn:hover { border-color: #ff4444; color: #fff; }

    .quality-btn.selected {
      border-color: #ff4444;
      background: rgba(255,68,68,0.1);
      color: #ff4444;
      font-weight: 600;
    }

    .download-btn {
      width: 100%;
      padding: 13px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .download-btn:hover:not(:disabled) {
      background: #e03333;
      transform: translateY(-1px);
    }

    .download-btn:disabled {
      background: #2a2a2a;
      color: #555;
      cursor: not-allowed;
      transform: none;
    }

    .status-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .status-box.show { display: block; }
    .status-box.loading { background: #1a1a1a; color: #aaa; }
    .status-box.success { background: rgba(76,175,80,0.1); color: #4caf50; border: 1px solid rgba(76,175,80,0.2); }
    .status-box.error { background: rgba(255,68,68,0.1); color: #ff6b6b; border: 1px solid rgba(255,68,68,0.2); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #444;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .output-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .output-input {
      flex: 1;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #888;
      font-size: 12px;
      outline: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .browse-btn {
      padding: 10px 14px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .browse-btn:hover { border-color: #ff4444; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-7 2h14v2H5v-2z"/>
        </svg>
      </div>
      <h1>YT <span>Downloader</span></h1>
    </div>

    <div class="field-label">YouTube URL</div>
    <input
      type="text"
      class="url-input"
      id="url-input"
      placeholder="https://www.youtube.com/watch?v=..."
    />

    <div class="field-label">Quality</div>
    <div class="quality-options">
      <button class="quality-btn" data-quality="720p">720p</button>
      <button class="quality-btn" data-quality="1080p">1080p</button>
      <button class="quality-btn" data-quality="audio">MP3 Audio</button>
    </div>

    <div class="field-label">Save To</div>
    <div class="output-row">
      <div class="output-input" id="output-dir">Loading...</div>
      <button class="browse-btn" id="browse-btn">Browse</button>
    </div>

    <button class="download-btn" id="download-btn" disabled>Download</button>

    <div class="status-box" id="status-box"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
