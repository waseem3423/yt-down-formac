<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .container { width: 460px; padding: 28px; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 36px; height: 36px;
      background: #ff4444;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    h1 { font-size: 20px; font-weight: 700; }
    h1 span { color: #ff4444; }

    .field-label {
      font-size: 11px; color: #666;
      margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }

    .url-input {
      width: 100%; padding: 11px 14px;
      background: #1a1a1a; border: 1.5px solid #2a2a2a;
      border-radius: 10px; color: #fff; font-size: 13px;
      outline: none; transition: border-color 0.15s;
      margin-bottom: 18px;
    }
    .url-input:focus { border-color: #ff4444; }
    .url-input::placeholder { color: #444; }

    .quality-options {
      display: flex; gap: 8px; margin-bottom: 18px;
    }

    .quality-btn {
      flex: 1; padding: 9px 0;
      border: 1.5px solid #2a2a2a; border-radius: 10px;
      background: #1a1a1a; color: #666;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    .quality-btn:hover { border-color: #ff4444; color: #fff; }
    .quality-btn.selected {
      border-color: #ff4444;
      background: rgba(255,68,68,0.1);
      color: #ff4444; font-weight: 600;
    }

    .output-row {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .output-input {
      flex: 1; padding: 9px 12px;
      background: #1a1a1a; border: 1.5px solid #2a2a2a;
      border-radius: 10px; color: #666; font-size: 12px;
      outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .browse-btn {
      padding: 9px 14px;
      background: #1a1a1a; border: 1.5px solid #2a2a2a;
      border-radius: 10px; color: #666; font-size: 12px;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .browse-btn:hover { border-color: #ff4444; color: #fff; }

    .download-btn {
      width: 100%; padding: 12px;
      background: #ff4444; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 14px;
    }
    .download-btn:hover:not(:disabled) { background: #e03333; transform: translateY(-1px); }
    .download-btn:disabled { background: #2a2a2a; color: #444; cursor: not-allowed; transform: none; }

    /* Progress section */
    .progress-section {
      display: none;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #2a2a2a;
    }
    .progress-section.show { display: block; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 12px; color: #aaa;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 320px;
    }

    .progress-percent {
      font-size: 13px; font-weight: 600;
      color: #ff4444; min-width: 40px; text-align: right;
    }

    .progress-bar-track {
      width: 100%; height: 6px;
      background: #2a2a2a; border-radius: 99px;
      overflow: hidden; margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ff4444, #ff7744);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .progress-bar-fill.indeterminate {
      width: 40% !important;
      animation: indeterminate 1.2s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .progress-status {
      font-size: 11px; color: #555;
    }

    .progress-status.success { color: #4caf50; }
    .progress-status.error   { color: #ff6b6b; }
    .progress-status.merging { color: #ffaa44; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-7 2h14v2H5v-2z"/>
        </svg>
      </div>
      <h1>YT <span>Downloader</span></h1>
    </div>

    <div class="field-label">YouTube URL</div>
    <input type="text" class="url-input" id="url-input"
      placeholder="https://www.youtube.com/watch?v=..." />

    <div class="field-label">Quality</div>
    <div class="quality-options">
      <button class="quality-btn" data-quality="720p">720p</button>
      <button class="quality-btn" data-quality="1080p">1080p</button>
      <button class="quality-btn" data-quality="audio">MP3 Audio</button>
    </div>

    <div class="field-label">Save To</div>
    <div class="output-row">
      <div class="output-input" id="output-dir">Loading...</div>
      <button class="browse-btn" id="browse-btn">Browse</button>
    </div>

    <button class="download-btn" id="download-btn" disabled>Download</button>

    <!-- Progress Section -->
    <div class="progress-section" id="progress-section">
      <div class="progress-header">
        <div class="progress-label" id="progress-label">Starting...</div>
        <div class="progress-percent" id="progress-percent">0%</div>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <div class="progress-status" id="progress-status">Downloading...</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
