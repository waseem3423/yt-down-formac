<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header svg { flex-shrink: 0; }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #ff4444;
    }

    .video-url {
      font-size: 11px;
      color: #aaa;
      background: #1a1a1a;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 14px;
      word-break: break-all;
      max-height: 48px;
      overflow: hidden;
    }

    .no-video {
      text-align: center;
      color: #888;
      font-size: 13px;
      padding: 20px 0;
    }

    .quality-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .quality-options {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .quality-btn {
      flex: 1;
      padding: 8px 0;
      border: 1.5px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quality-btn:hover { border-color: #ff4444; color: #fff; }

    .quality-btn.selected {
      border-color: #ff4444;
      background: #ff44441a;
      color: #ff4444;
      font-weight: 600;
    }

    #download-btn {
      width: 100%;
      padding: 10px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #download-btn:hover:not(:disabled) { background: #e03333; }

    #download-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .status.error { color: #ff6b6b; }
    .status.success { color: #4caf50; }
    .status.loading { color: #aaa; }

    #retry-btn {
      display: none;
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    #retry-btn:hover { background: #2a2a2a; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #555;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#ff4444">
      <path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-7 2h14v2H5v-2z"/>
    </svg>
    <h1>YT Downloader</h1>
  </div>

  <div id="main-content">
    <div class="video-url" id="video-url">Detecting video...</div>

    <div class="quality-label">Select Quality</div>
    <div class="quality-options">
      <button class="quality-btn" data-quality="720p">720p</button>
      <button class="quality-btn" data-quality="1080p">1080p</button>
      <button class="quality-btn" data-quality="audio">MP3</button>
    </div>

    <button id="download-btn" disabled>Download</button>
    <div class="status" id="status"></div>
    <button id="retry-btn">↺ Retry</button>
  </div>

  <div class="no-video" id="no-video" style="display:none;">
    No YouTube video detected.<br/>Open a YouTube video first.
  </div>

  <script src="popup.js"></script>
</body>
</html>
